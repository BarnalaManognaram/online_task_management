<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="styles/admin.css">

</head>

<body>

    <div class="container">

        <!-- =========================
             Header
        ========================== -->

        <div class="header">

            <h1>Admin Dashboard</h1>

            <button
                class="add-btn"
                onclick="showProjectForm()"
            >
                + Add Project
            </button>
             <button
            class="logout-btn"
            onclick="logout()"
        >
            Logout
        </button>


        </div>

        <!-- =========================
             Statistics
        ========================== -->

        <div class="stats-container">

            <div class="stats-card">

                <h2 id="projectsCount">0</h2>

                <p>Total Projects</p>

            </div>

            <div class="stats-card">

                <h2 id="inProgressCount">0</h2>

                <p>Tasks In Progress</p>

            </div>

            <div class="stats-card">

                <h2 id="completedCount">0</h2>

                <p>Tasks Completed</p>

            </div>

        </div>

        <!-- =========================
             Create Project Form
        ========================== -->

        <div
            class="card"
            id="projectForm"
            style="display: none;"
        >

            <div class="section-header">

                <h2>Create Project</h2>

                <button onclick="hideProjectForm()">
                    X
                </button>

            </div>

            <input
                type="text"
                id="projectTitle"
                placeholder="Project Title"
            >

            <textarea
                id="projectDescription"
                placeholder="Project Description"
            ></textarea>

            <input
                type="text"
                id="assignedManager"
                placeholder="Assigned Manager Email"
            >

            <input
                type="text"
                id="assignedDeveloper"
                placeholder="Assigned Developer Email"
            >

            <button onclick="createProject()">
                Save Project
            </button>

        </div>

        <!-- =========================
             Projects
        ========================== -->

        <div class="card">

            <div class="section-header">

                <h2>Projects</h2>

                <button onclick="getProjects()">
                    Refresh
                </button>

            </div>

            <div id="projects"></div>

        </div>

        <!-- =========================
             Task Board
        ========================== -->

        <div class="card">

            <h2 id="selectedProject">
                Select a project
            </h2>

            <div class="board">

                <div class="column">

                    <h3>Open</h3>

                    <div id="openTasks"></div>

                </div>

                <div class="column">

                    <h3>In Progress</h3>

                    <div id="progressTasks"></div>

                </div>

                <div class="column">

                    <h3>Review</h3>

                    <div id="reviewTasks"></div>

                </div>

                <div class="column">

                    <h3>Reopen</h3>

                    <div id="reopenTasks"></div>

                </div>

                <div class="column">

                    <h3>Done</h3>

                    <div id="doneTasks"></div>

                </div>

            </div>

            <!-- =========================
                 Create Task Form
            ========================== -->

            <div
                class="task-form"
                id="taskForm"
                style="display: none;"
            >

                <h3>Create Task</h3>

                <input
                    type="text"
                    id="taskTitle"
                    placeholder="Task Title"
                >

                <textarea
                    id="taskDescription"
                    placeholder="Task Description"
                ></textarea>

                <input
                    type="text"
                    id="taskDeveloper"
                    placeholder="Developer Email"
                >

                <input
                    type="date"
                    id="taskDeadline"
                >

                <button onclick="createTask()">
                    Create Task
                </button>

            </div>

        </div>

    </div>

    <script src="javascript/admin.js"></script>

</body>

</html>
